# BreakWave
# Created in collaboration with Cube23 Holdings LLC.

name: Bootstrap BreakWave

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Generate Flutter project
        run: |
          rm -rf /tmp/breakwave
          flutter create --org com.cube23 --platforms=android,ios /tmp/breakwave
          cp -R /tmp/breakwave/. "$GITHUB_WORKSPACE"/

      - name: Write custom app files
        run: |
          mkdir -p lib/app lib/features/home lib/theme test

          cat > README.md <<'EOT'
          # BreakWave

          Created in collaboration with Cube23 Holdings LLC.

          BreakWave is a recovery-focused Flutter app centered on helping users pause, ride out urges, and regain control.

          ## Initial bootstrap scope
          - Clean Flutter shell
          - Home screen scaffold
          - Bootstrap workflow
          - Cube23 collaboration notice
          EOT

          cat > NOTICE.md <<'EOT'
          BreakWave
          Created in collaboration with Cube23 Holdings LLC.

          This repository contains the initial BreakWave bootstrap scaffold and first-screen shell.
          EOT

          cat > lib/main.dart <<'EOT'
          // BreakWave
          // Created in collaboration with Cube23 Holdings LLC.

          import 'package:flutter/material.dart';
          import 'app/app.dart';

          void main() {
            runApp(const BreakWaveApp());
          }
          EOT

          cat > lib/app/app.dart <<'EOT'
          // BreakWave
          // Created in collaboration with Cube23 Holdings LLC.

          import 'package:flutter/material.dart';
          import '../features/home/home_screen.dart';
          import '../theme/app_theme.dart';

          class BreakWaveApp extends StatelessWidget {
            const BreakWaveApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'BreakWave',
                debugShowCheckedModeBanner: false,
                theme: AppTheme.theme,
                home: const HomeScreen(),
              );
            }
          }
          EOT

          cat > lib/theme/app_theme.dart <<'EOT'
          // BreakWave
          // Created in collaboration with Cube23 Holdings LLC.

          import 'package:flutter/material.dart';

          class AppTheme {
            static ThemeData get theme {
              return ThemeData(
                useMaterial3: true,
                colorScheme: ColorScheme.fromSeed(
                  seedColor: const Color(0xFF3A7BFF),
                  brightness: Brightness.dark,
                ),
                scaffoldBackgroundColor: const Color(0xFF0B1220),
              );
            }
          }
          EOT

          cat > lib/features/home/home_screen.dart <<'EOT'
          // BreakWave
          // Created in collaboration with Cube23 Holdings LLC.

          import 'package:flutter/material.dart';

          class HomeScreen extends StatelessWidget {
            const HomeScreen({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('BreakWave'),
                ),
                body: SafeArea(
                  child: Padding(
                    padding: const EdgeInsets.all(20),
                    child: Center(
                      child: ConstrainedBox(
                        constraints: const BoxConstraints(maxWidth: 520),
                        child: Column(
                          mainAxisAlignment: MainAxisAlignment.center,
                          crossAxisAlignment: CrossAxisAlignment.stretch,
                          children: [
                            const Text(
                              'Ride the urge. Don’t let it control you.',
                              textAlign: TextAlign.center,
                              style: TextStyle(
                                fontSize: 28,
                                fontWeight: FontWeight.w700,
                              ),
                            ),
                            const SizedBox(height: 12),
                            const Text(
                              'A private recovery companion for pause, rescue, reflection, and progress.',
                              textAlign: TextAlign.center,
                              style: TextStyle(
                                fontSize: 16,
                                color: Colors.white70,
                                height: 1.4,
                              ),
                            ),
                            const SizedBox(height: 28),
                            Card(
                              child: Padding(
                                padding: const EdgeInsets.all(20),
                                child: Column(
                                  crossAxisAlignment: CrossAxisAlignment.stretch,
                                  children: [
                                    const Text(
                                      'Today starts here',
                                      style: TextStyle(
                                        fontSize: 18,
                                        fontWeight: FontWeight.w600,
                                      ),
                                    ),
                                    const SizedBox(height: 10),
                                    const Text(
                                      'This is the clean bootstrap shell. Next up: Rescue, Log, Insights, and Support.',
                                      style: TextStyle(
                                        fontSize: 14,
                                        color: Colors.white70,
                                        height: 1.4,
                                      ),
                                    ),
                                    const SizedBox(height: 18),
                                    ElevatedButton(
                                      onPressed: () {},
                                      child: const Text('Open Rescue'),
                                    ),
                                  ],
                                ),
                              ),
                            ),
                          ],
                        ),
                      ),
                    ),
                  ),
                ),
              );
            }
          }
          EOT

          cat > test/widget_test.dart <<'EOT'
          // BreakWave
          // Created in collaboration with Cube23 Holdings LLC.

          import 'package:flutter_test/flutter_test.dart';
          import 'package:breakwave/app/app.dart';

          void main() {
            testWidgets('BreakWave renders home shell', (tester) async {
              await tester.pumpWidget(const BreakWaveApp());

              expect(find.text('BreakWave'), findsOneWidget);
              expect(find.text('Open Rescue'), findsOneWidget);
            });
          }
          EOT

      - name: Verify app
        run: |
          flutter pub get
          flutter analyze
          flutter test
          flutter build apk --debug

      - name: Commit generated scaffold
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Bootstrap BreakWave Flutter shell"
            git push
          fi
