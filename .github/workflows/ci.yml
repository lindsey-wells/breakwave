name: CI


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: breakwave-main
  cancel-in-progress: true

jobs:
  verify-test-build:
    name: Verify, Test, Build APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version
          python3 --version

      - name: Get dependencies
        run: flutter pub get

      - name: Run BreakWave verification scripts
        run: |
          set -e
          if [ -d tools ]; then
            found=0
            while IFS= read -r script; do
              found=1
              echo "Running $script"
              python3 "$script"
            done < <(find tools -maxdepth 1 -type f -name 'verify_bw*.py' | sort)

            if [ "$found" -eq 0 ]; then
              echo "No verify_bw*.py scripts found in tools/"
            fi
          else
            echo "No tools/ directory found"
          fi

      - name: Flutter test
        run: flutter test

      - name: Prepare Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No Android signing secrets found. Release build will use debug signing fallback."
            exit 0
          fi

          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Android signing secrets are incomplete."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF


      - name: Build release APK
        run: flutter build apk --release

      - name: Verify branded resources in release APK
        run: |
          python3 tools/verify_bw88rc1a.py \
            --artifact build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakwave-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Verify branded resources in release AAB
        run: |
          python3 tools/verify_bw88rc1a.py \
            --artifact build/app/outputs/bundle/release/app-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakwave-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload Play Store icon artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakwave-play-store-icon
          path: assets/branding/play_store_icon_512.png
          if-no-files-found: error
