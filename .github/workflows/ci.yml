name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: breakwave-main
  cancel-in-progress: true

jobs:
  verify-analyze-test-build:
    name: Verify, Analyze, Test, Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version
          python3 --version

      - name: Get dependencies
        run: flutter pub get

      - name: Run BreakWave verification scripts
        run: |
          set -e
          if [ -d tools ]; then
            found=0
            while IFS= read -r script; do
              found=1
              echo "Running $script"
              python3 "$script"
            done < <(find tools -maxdepth 1 -type f -name 'verify_bw*.py' | sort)

            if [ "$found" -eq 0 ]; then
              echo "No verify_bw*.py scripts found in tools/"
            fi
          else
            echo "No tools/ directory found"
          fi

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakwave-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
